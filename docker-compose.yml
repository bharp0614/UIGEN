services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uigen
      POSTGRES_PASSWORD: uigen
      POSTGRES_DB: uigen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uigen -d uigen"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://uigen:uigen@db:5432/uigen}
      JWT_SECRET: ${JWT_SECRET:-development-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
